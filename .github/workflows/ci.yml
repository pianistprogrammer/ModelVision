name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }}, ${{ matrix.extra }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
        extra: [core, torch, tensorflow, jax, huggingface, sklearn, onnx, all]
        exclude:
          # TensorFlow wheels for macOS + Python 3.12 have historically lagged.
          # Re-check quarterly.
          - os: macos-latest
            python: "3.12"
            extra: tensorflow
          - os: macos-latest
            python: "3.12"
            extra: all
          # Windows lacks reliable Cairo shipping — skip PDF-adjacent extras.
          - os: windows-latest
            extra: tensorflow
          - os: windows-latest
            extra: all
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # hatch-vcs needs full history to compute the version
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install (core only)
        if: matrix.extra == 'core'
        run: uv sync --extra dev
      - name: Install with extra
        if: matrix.extra != 'core'
        run: uv sync --extra ${{ matrix.extra }} --extra dev
      - name: Test
        run: uv run pytest -m "not slow and not golden" -n auto --cov --cov-report=xml
      - name: Enforce coverage threshold (all extras only)
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11' && matrix.extra == 'all'
        run: uv run coverage report --fail-under=85
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11' && matrix.extra == 'all'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv python install 3.11
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy modelvision

  golden:
    name: golden SVG regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv python install 3.11
      - run: uv sync --extra all --extra dev
      - run: uv run pytest -m golden
