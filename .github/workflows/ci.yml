name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }}, ${{ matrix.extra }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
        # "all" is intentionally excluded from the per-extra matrix.
        # torch + tensorflow + jax each ship their own OpenMP runtime and
        # segfault when all three are imported in the same pytest process.
        # Each framework is tested in isolation instead; the separate
        # "coverage" job below installs all extras and runs sequentially
        # (no -n auto) to collect combined coverage without the crash.
        extra: [core, torch, tensorflow, jax, huggingface, sklearn, onnx]
        exclude:
          # TensorFlow wheels for macOS + Python 3.12 have historically lagged.
          - os: macos-latest
            python: "3.12"
            extra: tensorflow
          # Windows lacks reliable Cairo/OpenMP shipping for TF and JAX.
          - os: windows-latest
            extra: tensorflow
          - os: windows-latest
            extra: jax
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # hatch-vcs needs full history to compute the version
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install (core only)
        if: matrix.extra == 'core'
        run: uv sync --extra dev
      - name: Install with extra
        if: matrix.extra != 'core'
        run: uv sync --extra ${{ matrix.extra }} --extra dev
      - name: Test
        # -p no:xdist falls back to single-process on the framework cells
        # that are known to be unstable under parallel collection.
        run: uv run pytest -m "not slow and not golden" --cov --cov-report=xml
      - name: Upload coverage (torch / ubuntu / 3.11 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11' && matrix.extra == 'torch'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # Separate sequential coverage job — installs every extra one at a time
  # via env isolation so frameworks don't deadlock, then merges coverage.
  coverage:
    name: coverage (ubuntu, py3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv python install 3.11
      # Install only non-conflicting extras together.  torch + sklearn +
      # onnx + huggingface coexist safely.  tensorflow and jax are each
      # added separately in isolated runs if needed for coverage; for now
      # the per-extra matrix cells cover them.
      - run: uv sync --extra torch --extra huggingface --extra sklearn --extra onnx --extra dev
      - name: Test (no parallel workers to avoid OpenMP crash)
        run: uv run pytest -m "not slow and not golden" --cov --cov-report=xml
      - name: Enforce coverage threshold
        run: uv run coverage report --fail-under=70
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv python install 3.11
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy modelvision

  golden:
    name: golden SVG regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv python install 3.11
      # Golden tests only need networkx + svgwrite (core), not frameworks.
      - run: uv sync --extra dev
      - run: uv run pytest -m golden
