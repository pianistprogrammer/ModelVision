  <polygon points="40,10 40,42 30,52 30,20" opacity="0.55"/>
  <rect x="16" y="20" width="14" height="32" rx="1" opacity="0.75"/>
  <polygon points="24,18 34,8 46,8 36,18" opacity="0.55"/>
  <polygon points="46,8 46,44 36,54 36,18" opacity="0.7"/>
  <rect x="24" y="18" width="12" height="36" rx="1" opacity="0.9"/>
  <polygon points="34,22 42,14 52,14 44,22" opacity="0.75"/>
  <polygon points="52,14 52,42 44,50 44,22" opacity="0.85"/>
  <rect x="34" y="22" width="10" height="28" rx="1"/>
</svg>
