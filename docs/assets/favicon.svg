<?xml version="1.0" encoding="UTF-8"?>
<!-- ModelVision favicon: three overlapping isometric cuboids, evoking a
     stacked feature-map ribbon. Matches the app's flow-style rendering. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7f8cff"/>
      <stop offset="1" stop-color="#4a5cff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="#1a1a2e"/>
  <!-- Back-most cuboid -->
  <polygon points="16,20 26,10 40,10 30,20" fill="#2a2f4a"/>
  <polygon points="40,10 40,42 30,52 30,20" fill="#0f1224"/>
  <rect x="16" y="20" width="14" height="32" rx="1" fill="#4a5cff" opacity="0.65"/>
  <!-- Middle cuboid -->
  <polygon points="24,18 34,8 46,8 36,18" fill="#3a4265"/>
  <polygon points="46,8 46,44 36,54 36,18" fill="#1a1a2e"/>
  <rect x="24" y="18" width="12" height="36" rx="1" fill="url(#a)"/>
  <!-- Front cuboid (accent) -->
  <polygon points="34,22 42,14 52,14 44,22" fill="#5a6cff"/>
  <polygon points="52,14 52,42 44,50 44,22" fill="#3a4265"/>
  <rect x="34" y="22" width="10" height="28" rx="1" fill="#7f8cff"/>
</svg>
